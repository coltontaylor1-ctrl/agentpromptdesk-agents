<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgentPromptDesk — Everyday Vault Agents</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:sans-serif;background:#0A0A0A;color:#F5F5F5;padding:2rem;min-height:100vh}
.container{max-width:860px;margin:0 auto}
.brand{color:#F97316;font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px;display:block}
h1{font-size:22px;font-weight:600;letter-spacing:-.02em;margin-bottom:6px}
p{color:#888;font-size:14px;margin-bottom:1.5rem}
.tabs{display:flex;gap:6px;margin-bottom:1.5rem;flex-wrap:wrap}
.tab{padding:8px 14px;border-radius:8px;border:1px solid #222;background:#111;font-size:12px;font-weight:500;cursor:pointer;color:#888;font-family:inherit;display:flex;align-items:center;gap:6px;transition:all .15s}
.tab:hover{background:#1A1A1A;color:#F5F5F5}
.tab.active{background:#1A1A1A;color:#F5F5F5;border-color:#333}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.panel{background:#111;border:1px solid #222;border-radius:14px;overflow:hidden}
.panel-header{padding:1rem 1.25rem;border-bottom:1px solid #1A1A1A;display:flex;align-items:center;gap:10px;background:#0D0D0D}
.icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.info h3{font-size:14px;font-weight:600;margin:0}
.info p{font-size:11px;color:#888;margin:2px 0 0}
.meta{margin-left:auto;display:flex;gap:8px;align-items:center}
.badge{font-size:11px;color:#888;padding:3px 9px;border:1px solid #222;border-radius:20px}
.status{font-size:11px;padding:3px 9px;border-radius:20px;background:rgba(29,158,117,.15);color:#1D9E75}
.chat{height:360px;overflow-y:auto;padding:1.25rem;display:flex;flex-direction:column;gap:14px;background:#0A0A0A;scroll-behavior:smooth}
.chat::-webkit-scrollbar{width:3px}
.chat::-webkit-scrollbar-thumb{background:#222;border-radius:3px}
.msg{display:flex;gap:8px;max-width:88%}
.msg.user{align-self:flex-end;flex-direction:row-reverse}
.avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;flex-shrink:0;background:rgba(249,115,22,.15);color:#F97316}
.msg.user .avatar{background:#1A1A1A;color:#888;border:1px solid #222}
.bubble{padding:10px 14px;border-radius:12px;font-size:13px;line-height:1.7;background:#111;border:1px solid #222;color:#E5E5E5;white-space:pre-wrap;word-break:break-word}
.msg.user .bubble{background:rgba(249,115,22,.12);border-color:rgba(249,115,22,.2);color:#F5F5F5}
.typing{display:flex;gap:4px;align-items:center;padding:12px 14px;background:#111;border:1px solid #222;border-radius:12px;width:fit-content}
.tdot{width:6px;height:6px;border-radius:50%;background:#888;animation:bounce 1.2s infinite}
.tdot:nth-child(2){animation-delay:.2s}
.tdot:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,80%,100%{transform:translateY(0);opacity:.4}40%{transform:translateY(-5px);opacity:1}}
.chips-area{padding:.875rem 1.25rem;border-top:1px solid #1A1A1A;background:#0D0D0D}
.chips-label{font-size:10px;color:#555;font-weight:600;letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px}
.chips{display:flex;gap:6px;flex-wrap:wrap}
.chip{padding:5px 10px;border:1px solid #222;border-radius:20px;font-size:12px;cursor:pointer;color:#888;background:#111;font-family:inherit;transition:all .15s}
.chip:hover{border-color:#F97316;color:#F97316}
.input-area{padding:.875rem 1.25rem;border-top:1px solid #1A1A1A;display:flex;gap:8px;align-items:flex-end;background:#0D0D0D}
textarea{flex:1;resize:none;border:1px solid #222;border-radius:8px;padding:10px 12px;font-size:13px;font-family:inherit;background:#111;color:#F5F5F5;min-height:42px;max-height:120px;line-height:1.5}
textarea:focus{outline:none;border-color:#333}
textarea::placeholder{color:#555}
.send{padding:10px 16px;background:#F97316;color:#0A0A0A;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s}
.send:hover{background:#EA6C0A}
.send:disabled{opacity:.4;cursor:not-allowed}
.footer{font-size:11px;color:#333;text-align:center;padding:8px;border-top:1px solid #1A1A1A;background:#0D0D0D}
.footer span{color:#F97316}
</style>
</head>
<body>
<div class="container">
<span class="brand">AgentPromptDesk — The Everyday Vault</span>
<h1>Your Personal Agents</h1>
<p>Eight agents built for real situations. Pick yours and start talking.</p>

<div class="tabs">
<button class="tab active" onclick="switchAgent('scrambler')"><span class="dot" style="background:#E24B4A"></span>Scrambler</button>
<button class="tab" onclick="switchAgent('jobseeker')"><span class="dot" style="background:#378ADD"></span>Job Seeker</button>
<button class="tab" onclick="switchAgent('escapee')"><span class="dot" style="background:#1D9E75"></span>9-5 Escapee</button>
<button class="tab" onclick="switchAgent('smallbiz')"><span class="dot" style="background:#9B59B6"></span>Small Biz</button>
<button class="tab" onclick="switchAgent('creator')"><span class="dot" style="background:#F97316"></span>Creator</button>
<button class="tab" onclick="switchAgent('caregiver')"><span class="dot" style="background:#E91E8C"></span>Caregiver</button>
<button class="tab" onclick="switchAgent('freelancer')"><span class="dot" style="background:#00BCD4"></span>Freelancer</button>
<button class="tab" onclick="switchAgent('builder')"><span class="dot" style="background:#FFD700"></span>Builder</button>
</div>

<div class="panel">
<div class="panel-header">
<div class="icon" id="icon" style="background:rgba(226,75,74,.15)">🚨</div>
<div class="info"><h3 id="aname">The Scrambler Agent</h3><p id="adesc">Your Emergency Financial Co-Pilot</p></div>
<div class="meta"><span class="badge" id="acount">8 prompts</span><span class="status">● Online</span></div>
</div>
<div class="chat" id="chat"></div>
<div class="chips-area"><div class="chips-label">Try asking</div><div class="chips" id="chips"></div></div>
<div class="input-area">
<textarea id="input" placeholder="Describe your situation..." rows="1" onkeydown="handleKey(event)" oninput="resize(this)"></textarea>
<button class="send" id="sendbtn" onclick="send()">Send</button>
</div>
<div class="footer">Powered by Claude · <span>AgentPromptDesk</span></div>
</div>
</div>

<script>
var WORKER = 'https://agentpromptdesk-api.colton-trismart.workers.dev';

var agents = {
scrambler:{
  name:'The Scrambler Agent',desc:'Your Emergency Financial Co-Pilot',
  icon:'🚨',bg:'rgba(226,75,74,.15)',init:'SA',count:'8 prompts',
  welcome:"I'm your Scrambler Agent — built for financial emergencies and fast action.\n\nTell me your situation: your current income, your biggest bill or problem, and one skill or asset you have. I'll triage it immediately and give you a ranked 14-day action plan.\n\nWhat's going on?",
  chips:['I have no income and rent is due in 2 weeks','I need fast cash with no experience','Help me figure out my next move','Build me a 14-day action plan'],
  system:'You are the Scrambler Agent for AgentPromptDesk Everyday Vault. You help people in financial emergencies get fast, specific, actionable plans. You are direct, practical, and zero-fluff. You never give generic advice. Everything you produce is based on the specific inputs the user gives you. You triage their situation, prioritize their next moves, and build a personalized fast-cash action plan. You specialize in: identifying the highest-leverage immediate actions, ranking daily tasks by impact, suggesting income sources based on existing skills, and providing day-by-day action plans. Always ask for current income, biggest bill/problem, and one skill or asset if not provided.'
},
jobseeker:{
  name:'The Job Seeker Agent',desc:'Your Personal Hiring Coach',
  icon:'💼',bg:'rgba(55,138,221,.15)',init:'JA',count:'8 prompts',
  welcome:"I'm your Job Seeker Agent — built to get you callbacks and offers.\n\nPaste your resume or describe your current job search situation and I'll audit it immediately. I'll find exactly what's costing you callbacks and tell you what to fix first.\n\nWhat's your situation?",
  chips:['Why am I not getting callbacks?','Audit my resume','Write me a cover letter hook','Help me prepare for an interview'],
  system:'You are the Job Seeker Agent for AgentPromptDesk Everyday Vault. You help people get more callbacks, better interviews, and job offers. You audit resumes and job search approaches, identify the specific gaps costing people opportunities, and provide actionable fixes in priority order. You write cover letter hooks, help with interview prep, and create outreach messages. You are direct and honest — if something is weak you say so clearly. Always identify the top 3 weaknesses and give a recommended sequence of steps to fix them.'
},
escapee:{
  name:'The Escapee Agent',desc:'Your Exit Strategy Architect',
  icon:'🚪',bg:'rgba(29,158,117,.15)',init:'EA',count:'8 prompts',
  welcome:"I'm your Escapee Agent — built to help you leave your 9-to-5 with a real plan.\n\nTell me: your current salary, savings runway, strongest skill, and target exit timeline. I'll calculate your minimum viable side income and build your escape plan.\n\nWhat are your numbers?",
  chips:['How much do I need to quit?','Build me an exit timeline','What side income should I start?','Help me validate my business idea'],
  system:'You are the Escapee Agent for AgentPromptDesk Everyday Vault. You help people escape their 9-to-5 jobs with realistic, specific exit strategies. You calculate minimum viable side income numbers, build realistic exit timelines, and sequence the steps needed to get there. You are grounded in reality — you do not give false hope, you give honest assessments and specific action steps. Always ask for current salary, savings runway, strongest skill, and target exit timeline if not provided. Produce a minimum viable side income number, a realistic exit timeline, and the first 3 steps to take this week.'
},
smallbiz:{
  name:'The Biz Owner Agent',desc:'Your Overworked Business Brain',
  icon:'🏪',bg:'rgba(155,89,182,.15)',init:'BA',count:'8 prompts',
  welcome:"I'm your Biz Owner Agent — built to find your biggest leak and fix it today.\n\nTell me your biggest current problem: marketing, operations, clients, or cash flow. Then describe your situation and I'll diagnose it and generate one ready-to-use asset you can deploy today.\n\nWhat's your biggest problem right now?",
  chips:['Find my biggest revenue leak','Write me a client email','Build an SOP for my process','Help me with my marketing'],
  system:'You are the Biz Owner Agent for AgentPromptDesk Everyday Vault. You help small business owners who are overwhelmed find their biggest time and revenue leaks and fix them with specific, immediately deployable assets. You diagnose problems in marketing, operations, client management, and cash flow. You generate ready-to-use assets: emails, SOPs, social posts, scripts, and frameworks. You are practical and specific — no theory, only things they can use today. Always identify the biggest leak first, then generate one ready-to-use asset, then recommend next steps.'
},
creator:{
  name:'The Creator Agent',desc:'Your Monetization Strategist',
  icon:'🎨',bg:'rgba(249,115,22,.15)',init:'CA',count:'8 prompts',
  welcome:"I'm your Creator Agent — built to help you monetize your audience.\n\nTell me: your platform, your niche, your audience size, and what people ask you for most. I'll identify your fastest path to revenue and give you a launch sequence plus a viral hook to test this week.\n\nWhat's your situation?",
  chips:['What should I sell to my audience?','Give me a viral hook to test','Build me a launch sequence','How do I monetize my following?'],
  system:'You are the Creator Agent for AgentPromptDesk Everyday Vault. You help content creators monetize their audiences with specific, actionable strategies. You identify the best-fit offer type based on their platform, niche, and audience behavior. You create 5-step launch sequences, write viral hooks to test demand, and build content strategies around monetization. You understand YouTube, Instagram, TikTok, X, newsletters, and podcasts. Always ask for platform, niche, audience size, and what people ask for most if not provided. Produce a best-fit offer recommendation, a launch sequence, and one viral hook to test this week.'
},
caregiver:{
  name:'The Caregiver Agent',desc:'Your Mental Load Manager',
  icon:'🧡',bg:'rgba(233,30,140,.15)',init:'CGA',count:'8 prompts',
  welcome:"I'm your Caregiver Agent — built to take the mental load off your plate.\n\nDump everything you're managing this week — all of it. I'll organize it into urgent today, this week, delegate, and drop. Then I'll generate the one script you need most right now.\n\nWhat's on your plate?",
  chips:['Here is everything I need to manage this week','Write me a school email','Help me make a budget plan','I am overwhelmed — help me prioritize'],
  system:'You are the Caregiver Agent for AgentPromptDesk Everyday Vault. You help parents and caregivers manage overwhelming mental loads with clear prioritization and ready-to-use scripts. When someone dumps everything they are managing, you sort it into: Urgent Today, This Week, Delegate, and Drop. Then you generate the one script they need most — a school email, budget plan, family meeting agenda, medical appointment summary, or whatever fits their situation. You are warm but efficient. You do not overwhelm them with more tasks — you simplify. Always end with the top 3 time-saving prompts for their situation.'
},
freelancer:{
  name:'The Freelancer Agent',desc:'Your Business of One Advisor',
  icon:'💻',bg:'rgba(0,188,212,.15)',init:'FA',count:'8 prompts',
  welcome:"I'm your Freelancer Agent — built to help you earn more and deal with less nonsense.\n\nTell me: your current rate, your services, and your biggest problem — pricing, scope creep, inconsistent clients, or late payments. I'll audit your setup and write you one email you can send today.\n\nWhat's going on?",
  chips:['Am I undercharging?','Write me a scope creep email','Help me raise my rates','I have a client not paying'],
  system:'You are the Freelancer Agent for AgentPromptDesk Everyday Vault. You help freelancers and independent contractors build sustainable, profitable businesses of one. You audit rates against market standards, identify revenue and boundary leaks, and generate ready-to-send emails for difficult situations: scope creep, late payment, rate increases, and client offboarding. You are direct and do not sugarcoat — if someone is undercharging you tell them exactly by how much and why. Always produce a rate audit verdict, one ready-to-send email, and a recommended prompt sequence for their situation.'
},
builder:{
  name:'The Builder Agent',desc:'Your Brutally Honest Co-Founder',
  icon:'⚡',bg:'rgba(255,215,0,.15)',init:'BLA',count:'8 prompts',
  welcome:"I'm your Builder Agent — I stress-test ideas so you don't waste months building the wrong thing.\n\nTell me your idea, who it's for, and what they do today instead of using your tool. I'll run a 5-point viability check, give you an honest verdict, and scope the MVP to what actually matters.\n\nWhat are you building?",
  chips:['Stress test my idea','What should my MVP be?','Is there a market for this?','Help me validate before I build'],
  system:'You are the Builder Agent for AgentPromptDesk Everyday Vault. You are a brutally honest co-founder who stress-tests product ideas against 5 viability signals: problem clarity, market size, willingness to pay, competitive advantage, and distribution strategy. You do not encourage bad ideas — you give honest verdicts including kill signals when they exist. You scope MVPs down to the single most important feature. You identify what to build first and what to cut. You are direct, specific, and founder-minded. Always run the 5-point viability check, give an honest verdict, scope the MVP to one core feature, and provide the first 3 prompts to move forward.'
}
};

var current = 'scrambler';
var msgs = {scrambler:[],jobseeker:[],escapee:[],smallbiz:[],creator:[],caregiver:[],freelancer:[],builder:[]};
var loading = false;

function switchAgent(k) {
  current = k;
  var a = agents[k];
  var keys = ['scrambler','jobseeker','escapee','smallbiz','creator','caregiver','freelancer','builder'];
  var tabs = document.querySelectorAll('.tab');
  for (var i = 0; i < tabs.length; i++) {
    tabs[i].classList.toggle('active', keys[i] === k);
  }
  document.getElementById('icon').textContent = a.icon;
  document.getElementById('icon').style.background = a.bg;
  document.getElementById('aname').textContent = a.name;
  document.getElementById('adesc').textContent = a.desc;
  document.getElementById('acount').textContent = a.count;
  var chipsEl = document.getElementById('chips');
  chipsEl.innerHTML = '';
  for (var j = 0; j < a.chips.length; j++) {
    var btn = document.createElement('button');
    btn.className = 'chip';
    btn.textContent = a.chips[j];
    btn.onclick = (function(t){return function(){useChip(t)}})(a.chips[j]);
    chipsEl.appendChild(btn);
  }
  render();
}

function render() {
  var a = agents[current];
  var cw = document.getElementById('chat');
  var m = msgs[current];
  if (m.length === 0) {
    cw.innerHTML = '<div class="msg"><div class="avatar">' + a.init + '</div><div class="bubble">' + a.welcome + '</div></div>';
  } else {
    var html = '';
    for (var i = 0; i < m.length; i++) {
      html += '<div class="msg ' + (m[i].role==='user'?'user':'') + '"><div class="avatar">' + (m[i].role==='user'?'You':a.init) + '</div><div class="bubble">' + m[i].content + '</div></div>';
    }
    cw.innerHTML = html;
  }
  cw.scrollTop = cw.scrollHeight;
}

function useChip(t) { document.getElementById('input').value = t; send(); }
function handleKey(e) { if (e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();} }
function resize(el) { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,120)+'px'; }

function send() {
  if (loading) return;
  var inp = document.getElementById('input');
  var t = inp.value.trim();
  if (!t) return;
  inp.value = ''; inp.style.height = 'auto';
  loading = true;
  document.getElementById('sendbtn').disabled = true;
  msgs[current].push({role:'user',content:t});
  render();
  var cw = document.getElementById('chat');
  var ty = document.createElement('div');
  ty.className = 'msg'; ty.id = 'typing';
  ty.innerHTML = '<div class="avatar">' + agents[current].init + '</div><div class="typing"><div class="tdot"></div><div class="tdot"></div><div class="tdot"></div></div>';
  cw.appendChild(ty); cw.scrollTop = cw.scrollHeight;
  var payload = {system:agents[current].system, messages:[]};
  for (var i = 0; i < msgs[current].length; i++) {
    payload.messages.push({role:msgs[current][i].role, content:msgs[current][i].content});
  }
  fetch(WORKER, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload)})
  .then(function(r){return r.json();})
  .then(function(d){
    var el = document.getElementById('typing'); if(el) el.remove();
    var reply = (d.content&&d.content[0]&&d.content[0].text)?d.content[0].text:'Something went wrong. Please try again.';
    msgs[current].push({role:'assistant',content:reply});
    render();
    loading = false;
    document.getElementById('sendbtn').disabled = false;
  })
  .catch(function(e){
    var el = document.getElementById('typing'); if(el) el.remove();
    msgs[current].push({role:'assistant',content:'Connection error: ' + e.message});
    render();
    loading = false;
    document.getElementById('sendbtn').disabled = false;
  });
}

switchAgent('scrambler');
</script>
</body>
</html>
